# Configurazione Principale Klipper - Flying Bear Ghost 5
# MKS Robin Nano v1.3 / Estrusore Orbiter v2.0 / Driver Silenziosi (Standalone) / BLTouch

# Include delle macro e delle configurazioni interfaccia web
# [include moonraker_obico_macros.cfg] # Scommenta se usi Obico/Spaghetti Detective
[include fluidd.cfg]                    # Cambia in [include mainsail.cfg] se usi Mainsail

[virtual_sdcard]
path: /home/giuse/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[pause_resume]

[display_status]

[respond]

# Configurazione della connessione alla scheda madre
[mcu]
# NOTA: Verifica l'ID corretto della porta seriale via SSH eseguendo il comando:
# ls /dev/serial/by-id/*
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

# Limiti fisici e dinamici della stampante
[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 3000
minimum_cruise_ratio: 0.5
max_z_velocity: 20
max_z_accel: 100

# Collegamento ai moduli di configurazione secondari
[include motors.cfg]
[include printing.cfg]
[include calibration.cfg]
[include others.cfg]

################################################################################
# MACRO DI CALIBRAZIONE PIATTO (LIVELLAMENTO MANUALE)
################################################################################

[gcode_macro G29]
description: Carica la mesh del piatto pre-salvata (evita blocchi se inserito nello Start G-Code)
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    BED_MESH_PROFILE LOAD=default
    RESPOND MSG="Mesh del piatto 'default' caricata correttamente."

[gcode_macro CALIBRA_VITI]
description: Avvia la procedura assistita per regolare le 4 manopole del piatto
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    RESPOND MSG="Spostamento sopra le viti del piatto. Usa un foglio di carta e premi ACCEPT o ADJUSTED su Mainsail."
    BED_SCREWS_ADJUST

[gcode_macro CREA_MESH_MANUALE]
description: Crea una nuova mappa (mesh) del piatto misurando i punti manualmente con il foglio di carta
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    RESPOND MSG="Avvio calibrazione mesh manuale. Regola l'altezza Z con la carta per ogni punto e conferma."
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE

# Definito localmente nel file principale per permettere a SAVE_CONFIG di scrivere l'offset Z senza conflitti
[stepper_z]
position_endstop: 0.0

