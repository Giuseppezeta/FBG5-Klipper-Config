# Configurazione Riscaldatori, Ventole e Funzioni di Stampa - Flying Bear Ghost 5

# Valori ereditati direttamente dal tuo precedente backup

[heater_bed]
heater_pin: PA0                          # Pin del riscaldatore del piatto su Robin Nano v1.3
sensor_type: EPCOS 100K B57560G104F      # Sensore di temperatura del piatto originale
sensor_pin: PC0
min_temp: 0
max_temp: 120

# Valori PID del piatto ereditati dal backup
control: pid
pid_Kp: 61.084
pid_Ki: 2.644
pid_Kd: 352.757

[fan]
# Ventola di raffreddamento del filamento (ventola materiale)
pin: PB1

[heater_fan heater_fan]
# Ventola di raffreddamento dell'hotend (si attiva automaticamente oltre i 50°C)
pin: PB0

[filament_switch_sensor filament_sensor]
# Sensore di fine filamento originale
switch_pin: PA4
runout_gcode:
    BEEP P=1500                          # Emette un bip acustico in caso di fine filamento

[firmware_retraction]
# Parametri di ritrazione gestiti direttamente dal firmware Klipper (slicing firmware retraction)
retract_length: 4
retract_speed: 45
