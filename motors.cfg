# Configurazione dei Motori Passo-Passo e Estrusore - Flying Bear Ghost 5

# Assi X, Y, Z configurati per driver silenziosi in modalità Standalone
# (La direzione dei motori è invertita rispetto ai driver originali A4988)

[stepper_x]
step_pin: PE3
dir_pin: PE2                            # PE2 per TMC silenziosi, !PE2 per driver stock A4988
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: !PA15                      # Finecorsa X
position_endstop: 0
position_max: 255                       # Dimensione piatto X
homing_speed: 50

[stepper_y]
step_pin: PE0
dir_pin: PB9                            # PB9 per TMC silenziosi, !PB9 per driver stock A4988
enable_pin: !PE1
microsteps: 16
rotation_distance: 40
endstop_pin: !PA12                      # Finecorsa Y
position_endstop: 0
position_max: 210                       # Dimensione piatto Y
homing_speed: 50

[stepper_z]
step_pin: PB5
dir_pin: !PB4                           # !PB4 per TMC silenziosi, PB4 per driver stock A4988
enable_pin: !PB8
microsteps: 16
rotation_distance: 8
endstop_pin: !PA11                      # Finecorsa fisico Z standard (normalmente chiuso)
position_endstop: 0.5                   # Distanza iniziale ugello/piatto al finecorsa. Da calibrare fisicamente.
position_max: 200                       # Altezza massima di stampa Z
position_min: -2.0                      # Permette di scendere leggermente sotto lo zero del finecorsa per regolare l'altezza iniziale
homing_speed: 10

################################################################################
# Configurazione Estrusore: ORBITER V2.0 in Direct Drive
################################################################################

[extruder]
step_pin: PD6
dir_pin: PD3                            # PD3 per Orbiter v2.0 su driver silenziosi (invertito rispetto a !PD3 perché estrudeva al contrario)
enable_pin: !PB3
microsteps: 32                          # 32 microstep consigliati per l'Orbiter v2.0
rotation_distance: 4.637                # Valore predefinito per Orbiter v2.0 (NON inserire gear_ratio!)
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
pressure_advance: 0.0                   # Da calibrare (es. 0.025)
heater_pin: PC3
sensor_type: EPCOS 100K B57560G104F      # Sensore hotend originale (se hai cambiato termistore, modifica qui)
sensor_pin: PC1
min_extrude_temp: 180
min_temp: 0
max_temp: 270

# Valori PID di riscaldamento ereditati dal tuo backup
control: pid
pid_Kp: 18.605
pid_Ki: 1.017
pid_Kd: 85.117

